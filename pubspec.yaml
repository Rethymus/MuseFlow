name: museflow
description: "MuseFlow 灵韵 — 人机协作小说创作辅助工具"
publish_to: 'none'
version: 0.1.5+6

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Immutable data classes
  freezed: ^3.2.5
  freezed_annotation: ^3.1.0

  # Rich text editor (winning editor from Phase 0 benchmark)
  super_editor: ^0.3.0-dev.52

  # Navigation
  go_router: ^17.2.3

  # AI integration
  openai_dart: ^6.0.0
  anthropic_sdk_dart: ^4.0.0
  ollama_dart: ^2.4.0

  # Local storage
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  flutter_secure_storage: ^10.3.1

  # Desktop window management
  window_manager: ^0.5.1

  # Supporting libraries
  uuid: ^4.5.1
  logger: ^2.5.0
  google_fonts: ^8.1.0
  markdown: ^7.3.1
  path_provider: ^2.1.6
  share_plus: ^12.0.0
  file_picker: ^10.0.0
  url_launcher: ^6.3.2
  connectivity_plus: ^7.0.0
  json_annotation: ^4.12.0
  web: ^1.1.1
  follow_the_leader: ^0.5.3
  fl_chart: ^1.2.0
  graphview: ^1.5.1

  path: ^1.9.1
  archive: ^4.0.9
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.15.1
  json_serializable: ^6.14.0
  riverpod_generator: ^4.0.4

dependency_overrides:
  # super_keyboard 0.4.0 hardcodes Android compileSdk 34, but current
  # flutter_plugin_android_lifecycle requires compileSdk 36. Keep this local
  # patch until upstream publishes a compatible release.
  super_keyboard:
    path: third_party/super_keyboard

flutter:
  uses-material-design: true
  assets:
    - assets/templates/world_presets/templates_zh.json
