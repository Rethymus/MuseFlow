name: museflow
description: A lightweight cross-platform note-taking application for Windows and Android.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: 1.0.8

  # Window Management (Desktop)
  window_manager: 0.3.8
  flutter_acrylic: 0.1.1

  # Data Storage
  hive: 2.2.3
  hive_flutter: 1.1.0
  sqflite: 2.3.3
  path_provider: 2.1.4

  # State Management
  provider: 6.1.2

  # Utilities
  intl: 0.19.0
  uuid: 4.5.1
  json_annotation: 4.9.0

  # File Operations
  file_picker: 8.1.3
  share_plus: 10.0.2

  # HTTP & API
  http: 1.2.2
  dio: 5.7.0

  # Security
  flutter_secure_storage: 9.2.2
  encrypt: 5.0.3

  # Retry Logic
  retry: 3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: 2.4.13
  hive_generator: 2.0.1
  json_serializable: 6.8.0

  # Linting
  flutter_lints: 4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
