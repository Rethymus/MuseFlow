<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>《剑道苍穹》百章修仙验证样例</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="eyebrow">100-Chapter Xianxia Sample</div>
      <h1>《剑道苍穹》百章修仙验证样例</h1>
      <p class="lead">这是 v1.3 用户旅程自动化验证使用的确定性样例，用于展示 MuseFlow 从世界观到百章导出的完整链路。它是效果参考和验收材料，不是最终文学出版稿。</p>
      <nav class="nav">
        <a class="button primary" href="index.html">成果首页</a>
        <a class="button" href="validation-report.html">验证报告</a>
      </nav>
    </section>

    <h2>章节目录与剧情摘要</h2>
    <div class="chapter-layout">
      <aside class="toc" aria-label="章节目录">
        <h3>目录</h3>
        <ol id="toc"></ol>
      </aside>
      <section id="chapters" class="chapter-list" aria-live="polite"></section>
    </div>

    <footer class="footer">数据来源：<code>docs/v1.3-user-journey/data/chapters.json</code>，由 <code>test/journey/helpers/story_outline.dart</code> 整理生成。</footer>
  </main>
  <script>
    async function loadChapters() {
      const response = await fetch('data/chapters.json');
      if (!response.ok) throw new Error('无法加载章节数据');
      const chapters = await response.json();
      const toc = document.getElementById('toc');
      const list = document.getElementById('chapters');
      for (const chapter of chapters) {
        const id = `chapter-${chapter.number}`;
        const tocItem = document.createElement('li');
        const link = document.createElement('a');
        link.href = `#${id}`;
        link.textContent = `第${chapter.number}章 ${chapter.title}`;
        tocItem.appendChild(link);
        toc.appendChild(tocItem);

        const article = document.createElement('article');
        article.className = 'chapter';
        article.id = id;
        article.innerHTML = `<h2>第${chapter.number}章 ${chapter.title}</h2><p>${chapter.summary}</p>`;
        list.appendChild(article);
      }
    }

    loadChapters().catch((error) => {
      document.getElementById('chapters').innerHTML = `<article class="chapter"><h2>加载失败</h2><p>${error.message}</p></article>`;
    });
  </script>
</body>
</html>
