name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Format, Analyze, Test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake curl git libgtk-3-dev libsecret-1-dev ninja-build pkg-config unzip xz-utils zip xvfb

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Resolve dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Run tests
        run: flutter test

      - name: Run integration smoke
        run: xvfb-run -a flutter test integration_test/app_test.dart -d linux

  repository-checks:
    name: README Assets and Hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Check README assets
        run: scripts/check_readme_assets.sh

      - name: Check repository hygiene
        run: scripts/check_repo_hygiene.sh

      - name: Check shell scripts
        run: scripts/check_shell_scripts.sh

      - name: Check AI adapter wiring
        run: scripts/check_ai_adapter_wiring.sh

      - name: Check editor docs
        run: scripts/check_editor_docs.sh

      - name: Check dependency docs
        run: scripts/check_dependency_docs.sh

      - name: Check storage architecture docs
        run: scripts/check_storage_architecture.sh

      - name: Validate platform support claims
        run: scripts/validate_platform_support.sh

  build-smoke:
    name: Build Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake curl git libgtk-3-dev libsecret-1-dev ninja-build pkg-config unzip xz-utils zip

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Resolve dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Build Linux release
        run: flutter build linux --release

      - name: Build Web release
        run: flutter build web --release
