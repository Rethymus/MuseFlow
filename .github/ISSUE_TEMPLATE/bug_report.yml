name: Bug report
description: Report a reproducible MuseFlow problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List exact steps, sample data, and platform.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.1.0 / commit SHA
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
